
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>PICK</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#6D5DFC">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/style.css?v={{ asset_version }}">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="side-brand">
      <div class="brand-mark">P</div>
      <div>
        <strong>PICK</strong>
        <span>AI Service</span>
      </div>
    </div>
    <button class="new-chat" onclick="newChat()">+ 새 채팅</button>
    <div id="chatList" class="chat-list"></div>
    <div class="side-bottom">
      {% if is_admin %}
      <a href="/admin">관리자</a>
      {% endif %}
      <a href="/logout">로그아웃</a>
      <span>{{ username }}</span>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div>
        <strong>PICK</strong>
        <span>김민석님의 AI 챗봇</span>
      </div>
      <div class="online">● Online</div>
    </header>

    <section id="messageArea" class="message-area"></section>

    <section class="composer-shell">
      <div class="composer">
        <textarea id="messageInput" placeholder="PICK에게 메시지 보내기"></textarea>
        <button id="sendBtn" onclick="sendMessage()">전송</button>
      </div>
    </section>
  </main>
</div>

<script src="/static/app.js?v={{ asset_version }}"></script>
</body>
</html>
