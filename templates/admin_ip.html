<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>PICK IP 차단</title><link rel="stylesheet" href="/static/style.css"></head>
<body class="admin-body"><div class="admin-page">
<h1>IP 차단 관리</h1>
<p><a href="/admin">유저 관리</a> · <a href="/admin/logs">로그 보기</a> · <a href="/">채팅</a></p>
<form method="post" class="admin-form">
  <input name="ip" placeholder="차단할 IP" required>
  <input name="reason" placeholder="사유">
  <button>IP 차단</button>
</form>
<table><thead><tr><th>ID</th><th>IP</th><th>사유</th><th>등록일</th><th>관리</th></tr></thead><tbody>
{% for ip in ips %}
<tr><td>{{ ip.id }}</td><td>{{ ip.ip }}</td><td>{{ ip.reason }}</td><td>{{ ip.created_at }}</td>
<td><form method="post" action="/admin/ip/{{ ip.id }}/delete"><button class="danger">차단 해제</button></form></td></tr>
{% endfor %}
</tbody></table>
</div></body></html>
