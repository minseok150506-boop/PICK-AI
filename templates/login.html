
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>PICK 로그인</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="brand">
      <div class="brand-mark">P</div>
      <h1>PICK</h1>
    </div>
    <p class="muted">PICK에 로그인해 주세요. 저장된 자동완성 값은 사용하지 않습니다.</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post" autocomplete="off">
      <input name="login_id" placeholder="아이디" autocomplete="off" autocapitalize="none" spellcheck="false" required>
      <input name="login_password" type="password" placeholder="비밀번호" autocomplete="new-password" required>
      <button>로그인</button>
    </form>
    <p class="small">계정이 없으신가요? <a href="/register">회원가입</a></p>
  </div>
</body>
</html>
