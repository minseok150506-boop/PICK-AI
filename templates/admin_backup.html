<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>PICK 백업/복구</title><link rel="stylesheet" href="/static/style.css"></head>
<body class="admin-dashboard-body"><div class="admin-layout">
<aside class="admin-sidebar"><div class="admin-logo">PICK</div><div class="admin-menu-title">관리자 메뉴</div><nav class="admin-nav">
<a href="/admin">👥 사용자 관리</a><a href="/admin/ip">🛡️ IP 차단 관리</a><a href="/admin/logs">🔒 로그인 로그</a><a href="/">관리자 메뉴 닫기</a>
</nav></aside>
<main class="admin-main"><header class="admin-top"><div></div><div class="admin-account"><span>{{ session.get("username") }}</span><a href="/logout">로그아웃</a><a href="/">관리자 메뉴 닫기</a></div></header>
<section class="admin-content"><h1>DB 백업/복구</h1><p class="admin-subtitle">계정, 채팅, 메시지, 차단, 로그 데이터를 JSON으로 백업하고 복구합니다.</p>
{% if error %}<div class="error">{{ error }}</div>{% endif %}{% if success %}<div class="success">{{ success }}</div>{% endif %}
<section class="admin-panel"><h2>백업 다운로드</h2><p class="admin-muted">현재 DB 데이터를 JSON 파일로 다운로드합니다.</p><a class="primary-link" href="/admin/backup/download">백업 파일 다운로드</a></section>
<section class="admin-panel" style="margin-top:16px;"><h2>백업 복구</h2><form method="post" action="/admin/backup/restore" enctype="multipart/form-data" class="admin-form"><input type="file" name="backup_file" accept=".json,application/json" required><label style="display:flex;align-items:center;gap:8px;color:#e5e7eb;"><input type="checkbox" name="replace" value="1"> 기존 데이터 삭제 후 복구</label><button>복구 실행</button></form></section>
</section></main></div></body></html>
